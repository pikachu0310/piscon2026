[Service]
# systemd's host default is soft 1024 / hard 524288. Under benchmark load the
# Go server reaches the soft limit and stops accepting new sockets, even though
# `systemctl show` only makes the hard ceiling obvious.
LimitNOFILE=524288:524288
# E29 tested a larger value, but its valid score regressed by 6.7%. Keep the Go
# default explicit so a reproduced deployment cannot inherit a host override.
Environment=GOGC=100
