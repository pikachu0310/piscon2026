[Service]
# systemd's host default is soft 1024 / hard 524288. Under benchmark load the
# Go server reaches the soft limit and stops accepting new sockets, even though
# `systemctl show` only makes the hard ceiling obvious.
LimitNOFILE=524288:524288
# The compact in-memory condition history leaves over 2 GiB available during a
# measured run. Spend part of that headroom on fewer GC cycles and shorter tail
# latency; Go 1.16 predates GOMEMLIMIT, so keep this as one explicit knob.
Environment=GOGC=300
