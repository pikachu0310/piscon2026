upstream isucondition_backend {
    server 10.0.0.113:3000;
    keepalive 128;
}

upstream isucondition_registration_backend {
    server 10.0.0.143:3000;
    keepalive 64;
}

# Every condition eventually updates the authoritative generation on s3. A
# request sent to s2 is decoded and batch-forwarded there; a request sent to s3
# updates the same state directly. This weighted split therefore balances CPU
# without creating two independent condition stores.
upstream isucondition_condition_backend {
    server 10.0.0.143:3000 weight=2;
    server 10.0.0.113:3000 weight=1;
    keepalive 128;
}

map $request_method $api_isu_upstream {
    default isucondition_backend;
    POST isucondition_backend;
}

map $request_method $condition_upstream {
    default isucondition_backend;
    POST isucondition_condition_backend;
}

server {
    include /etc/nginx/snippets/isuobserve-mode.conf;

    listen 80 default_server;
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certificates/tls-cert.pem;
    ssl_certificate_key /etc/nginx/certificates/tls-key.pem;

    root /home/isucon/webapp/public;
    open_file_cache max=1000 inactive=60s;
    open_file_cache_valid 60s;

    location ^~ /assets/ {
        try_files $uri =404;
        expires max;
        add_header Cache-Control "public, immutable";
    }

    location = / {
        try_files /index.html =404;
    }

    location = /register {
        try_files /index.html =404;
    }

    location ~ ^/isu/[^/]+(?:/(?:condition|graph))?/?$ {
        try_files /index.html =404;
    }

    location ^~ /api/condition/ {
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Request-ID $request_id;
        proxy_pass http://$condition_upstream;
    }

    location = /api/isu {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Request-ID $request_id;
        proxy_pass http://$api_isu_upstream;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Request-ID $request_id;
        proxy_pass http://isucondition_backend;
    }
}
