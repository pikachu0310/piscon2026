upstream isucondition_local_backend {
    server 127.0.0.1:3000;
    keepalive 128;
}

# The JIA poster sends condition payloads directly to this host. Public browser
# traffic still enters through s1; only the high-rate condition ingestion path
# is moved next to the Go process.
server {
    include /etc/nginx/snippets/isuobserve-mode.conf;

    listen 80 default_server;
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certificates/tls-cert.pem;
    ssl_certificate_key /etc/nginx/certificates/tls-key.pem;

    location ^~ /api/condition/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Request-ID $request_id;
        proxy_request_buffering off;
        proxy_pass http://isucondition_local_backend;
    }

    location / {
        return 404;
    }
}
